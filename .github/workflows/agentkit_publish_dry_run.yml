name: Agentkit publish dry-run

on:
  pull_request:
    paths:
      - 'agentkit/**'
      - 'tool/agentkit/**'
  push:
    branches:
      - main
    paths:
      - 'agentkit/**'
  schedule:
    - cron: '0 8 * * 3'

jobs:
  publish-dry-run:
    name: pub.dev dry-run (agentkit)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Workspace tests
        run: make -C agentkit test

      - name: dart pub publish --dry-run (all packages)
        run: make publish-agentkit-dry-run
