name: Publish pub.dev packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: pub-dev-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pub.dev
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: dart-lang/setup-dart@v1

      - name: Assert release tag matches VERSION
        if: github.event_name == 'push'
        run: bash tool/release/assert_release_tag.sh "${{ github.ref_name }}"

      - name: Release preflight
        run: bash tool/release/publish_pub_packages.sh

      - name: Publish packages
        if: github.event_name == 'push'
        run: bash tool/release/publish_pub_packages.sh --execute --skip-existing
