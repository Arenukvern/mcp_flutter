name: Agentkit eval gates

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly Monday 06:00 UTC — static battery + agentkit package tests
    - cron: '0 6 * * 1'

jobs:
  agentkit-static:
    name: Agentkit static eval (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mcp_server_dart dependencies
        working-directory: mcp_server_dart
        run: flutter pub get

      - name: Static dogfood battery
        run: make dogfood-eval-static

  agentkit-integration:
    name: Agentkit integration gate (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mcp_server_dart dependencies
        working-directory: mcp_server_dart
        run: flutter pub get

      - name: Full agentkit integration matrix
        run: |
          make check-agentkit-integration
          make -C agentkit analyze

  agentkit-weekly:
    name: Agentkit package tests (weekly / main)
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mcp_server_dart dependencies
        working-directory: mcp_server_dart
        run: flutter pub get

      - name: Agentkit package test matrix
        run: |
          make -C agentkit test
          make -C agentkit analyze
          dart test packages/server_capability_kernel packages/server_capability_core

      - name: Static dogfood battery
        run: make dogfood-eval-static
