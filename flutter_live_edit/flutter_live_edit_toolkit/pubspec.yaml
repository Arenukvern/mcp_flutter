name: flutter_live_edit_toolkit
description: Flutter app-side live edit runtime built on top of mcp_toolkit.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  dart_mcp: ^0.5.0
  path: ^1.9.0
  flutter:
    sdk: flutter
  flutter_live_edit_agent:
    path: ../flutter_live_edit_agent
  flutter_live_edit_core:
    path: ../flutter_live_edit_core
  live_edit_tooling_ui_kit:
    path: ../live_edit_tooling_ui_kit
  from_json_to_json: ^0.4.0
  mcp_toolkit:
    path: ../../mcp_toolkit/mcp_toolkit
  vm_service: ^15.0.2
  xsoulspace_inference_core:
    path: ../../../../xs/dart_flutter_packages/pkgs/xsoulspace_inference_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
  xsoulspace_lints: ^0.1.2

flutter:
  uses-material-design: true
