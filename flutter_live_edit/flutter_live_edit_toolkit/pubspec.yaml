name: flutter_live_edit_toolkit
description: Flutter app-side live edit runtime built on top of mcp_toolkit.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  collection: ^1.19.1
  dart_mcp: ^0.5.0
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  from_json_to_json: ^0.5.0
  is_dart_empty_or_not: ^0.4.0
  json_annotation: ^4.11.0
  live_edit_tooling_ui_kit:
    path: ../live_edit_tooling_ui_kit
  mcp_toolkit:
    path: ../../mcp_toolkit/mcp_toolkit
  path: ^1.9.1
  vm_service: ^15.0.2
  xsoulspace_inference_codex_exec: ^0.1.0-beta.1
  xsoulspace_inference_core: ^0.1.0-beta.1
  xsoulspace_inference_cursor_agent: ^0.1.0-beta.1
dev_dependencies:
  build_runner: ^2.13.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  lints: ^6.1.0
  xsoulspace_lints: ^0.1.2

flutter:
  uses-material-design: true
