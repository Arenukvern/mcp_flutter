  (scope, context, commands).
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_live_edit_toolkit:
    path: ../flutter_live_edit_toolkit
  live_edit_tooling_ui_kit:
    path: ../live_edit_tooling_ui_kit

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
  xsoulspace_lints: ^0.1.2

flutter:
  uses-material-design: true
