name: live_edit_tooling_ui_kit
description: Abstract bubble and panel widgets for the live-edit tool layer;
  view-model and callback driven, no toolkit dependency.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  live_edit_models:
    path: ../live_edit_models

dev_dependencies:
  build_runner: ^2.13.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  lints: ^6.1.0
  xsoulspace_lints: ^0.1.2

flutter:
  uses-material-design: true
