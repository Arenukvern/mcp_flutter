name: mcp_flutter_workspace
publish_to: none
environment:
  sdk: ">=3.12.0 <4.0.0"

workspace:
  - packages/core
  - packages/server_capability_kernel
  - packages/server_capability_core
  - mcp_toolkit
  - mcp_server_dart

dependency_overrides:
  intentcall_core:
    path: ../agentkit/packages/intentcall_core
  intentcall_mcp:
    path: ../agentkit/packages/intentcall_mcp
  intentcall_session:
    path: ../agentkit/packages/intentcall_session
