name: mcp_flutter_workspace
publish_to: none
environment:
  sdk: ">=3.12.0 <4.0.0"

workspace:
  - packages/core
  - packages/server_capability_kernel
  - packages/server_capability_core
  - mcp_toolkit
  - mcp_server_dart

dependency_overrides:
  intentcall_core:
    git:
      url: https://github.com/Arenukvern/intentcall.git
      ref: chore/adopt-steward-governance
      path: packages/intentcall_core
  intentcall_mcp:
    git:
      url: https://github.com/Arenukvern/intentcall.git
      ref: chore/adopt-steward-governance
      path: packages/intentcall_mcp
  intentcall_session:
    git:
      url: https://github.com/Arenukvern/intentcall.git
      ref: chore/adopt-steward-governance
      path: packages/intentcall_session
