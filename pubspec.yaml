name: mcp_flutter_workspace
publish_to: none
environment:
  sdk: ^3.11.0

workspace:
  - packages/core
  - packages/server_capability_kernel
  - packages/server_capability_core
  - mcp_server_dart

# Until Phase 7.4 publish + 7.5 cutover, force local intentcall for all consumers.
dependency_overrides:
  intentcall_schema:
    path: ../agentkit/packages/intentcall_schema
  intentcall_core:
    path: ../agentkit/packages/intentcall_core
  intentcall_mcp:
    path: ../agentkit/packages/intentcall_mcp
  intentcall_codegen:
    path: ../agentkit/packages/intentcall_codegen
  intentcall_webmcp:
    path: ../agentkit/packages/intentcall_webmcp
  intentcall_gemma:
    path: ../agentkit/packages/intentcall_gemma
  intentcall_apple:
    path: ../agentkit/packages/intentcall_apple
  intentcall_android:
    path: ../agentkit/packages/intentcall_android
  intentcall_platform:
    path: ../agentkit/packages/intentcall_platform
  intentcall_testing:
    path: ../agentkit/packages/intentcall_testing
