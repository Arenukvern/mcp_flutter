name: flutter_mcp_toolkit_capability_core
description: >-
  Core Flutter MCP capability (`fmt`) — VM inspection, interaction, navigation,
  diagnostics, and hot-reload coordination. Server-side Dart; no Flutter SDK
  dependency.
version: 0.1.0
license: MIT
repository: https://github.com/Arenukvern/mcp_flutter/tree/main/flutter_mcp_toolkit_capability_core
issue_tracker: https://github.com/Arenukvern/mcp_flutter/issues
documentation: https://github.com/Arenukvern/mcp_flutter/tree/main/flutter_mcp_toolkit_capability_core#readme

environment:
  sdk: '>=3.11.0 <4.0.0'
resolution: workspace

dependencies:
  collection: ^1.19.1
  dart_mcp: ^0.5.0
  flutter_mcp_toolkit_capability_kernel:
  flutter_mcp_toolkit_core:
  from_json_to_json: ^0.5.0
  is_dart_empty_or_not: ^0.4.0
  meta: ^1.17.0
  vm_service: ^15.0.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0

topics:
  - mcp
  - flutter
  - dart
  - debugging
