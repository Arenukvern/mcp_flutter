coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
        informational: false
    patch:
      default:
        target: auto
        threshold: 0.5%
        informational: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  mcp_server_dart:
    paths:
      - mcp_server_dart/lib

ignore:
  - "**/*.g.dart"
  - "**/*.freezed.dart"
  - "mcp_server_dart/test/**"
  - "mcp_server_dart/tool/**"
  - "mcp_server_dart/experiments/**"
