environment:
  sdk: '>=3.11.0 <4.0.0'
resolution: workspace

dependencies:
  meta: ^1.17.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1

topics:
  - mcp
  - flutter
  - dart
  - debugging
