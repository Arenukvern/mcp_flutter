name: mcp_shared_core
description: >-
  Pure-Dart value types shared between mcp_server_dart and mcp_capability_core.
  No Flutter, no dart_mcp, no transport dependencies. Contains CoreCommand
  hierarchy, CoreResult/CoreError envelopes, CoreErrorCode constants,
  connection override parsing, and visual-capture pure enums.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  meta: ^1.17.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
