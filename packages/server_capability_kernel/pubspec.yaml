name: flutter_mcp_toolkit_capability_kernel
description: >-
  Capability kernel contracts for Flutter MCP Toolkit — composable MCP units,
  host services, tool/resource registration, and prefixed tool naming. Pure
  Dart; no Flutter or transport.
version: 0.1.0
publish_to: none
license: MIT
repository: https://github.com/Arenukvern/mcp_flutter/tree/main/packages/server_capability_kernel
issue_tracker: https://github.com/Arenukvern/mcp_flutter/issues
documentation: https://github.com/Arenukvern/mcp_flutter/tree/main/packages/server_capability_kernel#readme

environment:
  sdk: ">=3.11.0 <4.0.0"
resolution: workspace

dependencies:
  flutter_mcp_toolkit_core:
  intentcall_mcp:
    path: ../../../agentkit/packages/intentcall_mcp
  intentcall_schema:
    path: ../../../agentkit/packages/intentcall_schema
  meta: ^1.17.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
  xsoulspace_lints: ^0.1.2

topics:
  - mcp
  - flutter
  - dart
