  dart_mcp: ^0.5.0
  flutter_mcp_toolkit_capability_kernel: ^4.0.0-dev.5
  flutter_mcp_toolkit_core: ^4.0.0-dev.5
  from_json_to_json: ^0.5.0
  intentcall_codegen: ^0.6.0
  intentcall_core: ^0.6.0
  intentcall_mcp: ^0.6.0
  intentcall_schema: ^0.6.0
  is_dart_empty_or_not: ^0.4.0
  meta: ^1.18.0
  vm_service: ^15.0.2
dev_dependencies:
  build_runner: ^2.15.0
  lints: ^6.1.0
  test: ^1.25.0
