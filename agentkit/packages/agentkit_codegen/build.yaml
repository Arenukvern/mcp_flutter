targets:
  $default:
    builders:
      agentkit_codegen|agent_tool:
        generate_for:
          - example/**

builders:
  agent_tool:
    import: "package:agentkit_codegen/builder.dart"
    builder_factories: ["agentToolBuilder"]
    build_extensions: {".dart": [".g.dart"]}
    auto_apply: dependents
    build_to: source
