name: agentkit_workspace
publish_to: none
description: Standalone agentkit monorepo (extracted from mcp_flutter Phase 7).

environment:
  sdk: ^3.11.0

workspace:
  - packages/agentkit_schema
  - packages/agentkit_core
  - packages/agentkit_mcp
  - packages/agentkit_codegen
  - packages/agentkit_webmcp
  - packages/agentkit_gemma
  - packages/agentkit_apple
  - packages/agentkit_android
  - packages/agentkit_platform
  - packages/agentkit_testing

dev_dependencies:
  lints: ^6.1.0
  xsoulspace_lints: ^0.1.2
