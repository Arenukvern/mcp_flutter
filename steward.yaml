schema: steward/v1
repo:
  id: mcp_flutter
  archetype: harness
harness:
  name: flutter-mcp-toolkit
  mode: cli_mcp
  description: Validation, contract testing, and local skills management for the Flutter MCP Server and Toolkit.
  entrypoints:
    cli: flutter-mcp-toolkit
    mcp_server: flutter-mcp-toolkit-server
    mcp_tool_prefix: fmt_
adoption:
  status: adopting
  owner: flutter-mcp-toolkit
  gate:
    pillar: quality
stewardship:
  governance:
    charter: AGENTS.md
    adr_dir: decisions/
    ethics_charter: docs/NORTH_STAR.md
  knowledge:
    docs_map: docs/start_here/docs_map.mdx
    source_policy: required_for_external_claims
  repo_quality:
    contract_spec: steward.yaml
    maturity_model: general_stewardship
    evidence: .steward/benchmark-summaries
  skill_lifecycle:
    installable_skills: true
    registry: skills.sh.json
  quality:
    validate: make check-contracts
    skill_eval: steward eval
  harness:
    enabled: true
    action_contract: actions
  release:
    changelog: CHANGELOG.md
    artifact_provenance: required
  review_handoff:
    moe_required_for_architecture: true
  strategic_alignment:
    vision_source: docs/start_here/why_this_repo_matters.mdx
    success_evidence: required
  security:
    action_effects: required
    redaction: steward/redaction/v1
  org:
    owners: AGENTS.md
docs:
  "Why This Repo Matters": docs/start_here/why_this_repo_matters.mdx
  "Feature Map": docs/start_here/feature_map.mdx
  "Docs Map": docs/start_here/docs_map.mdx
  "CLI vs MCP": docs/start_here/cli_vs_mcp.mdx
  "Execution Playbook": docs/ai_agents/execution_playbook.mdx
  "Architecture": docs/core/project_architecture.mdx
  "Dynamic Tool Registry": docs/core/dynamic_tools_registry.mdx
actions:
  fmt.check.tool-prefix:
    kind: command
    desc: Verify canonical fmt_ tool prefix contract and changelog surface.
    command:
      argv: [/bin/bash, tool/contracts/check_tool_prefix.sh]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/contracts/check_tool_prefix.sh
        - tool/contracts/expected_tool_surface.txt
        - CHANGELOG.md
        - README.md
        - ARCHITECTURE.md
        - docs/start_here/migration_v2_to_v3.mdx
        - decisions/0001_capability_kernel_and_tool_prefix.mdx
        - decisions/0002_v3_scope_and_consolidation_deferrals.mdx
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  fmt.check.intentcall-hosted-deps:
    kind: command
    desc: Verify hosted IntentCall dependency cutover has no stale local path dependencies.
    command:
      argv: [/bin/bash, tool/intentcall/check_no_path_deps.sh]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/intentcall/check_no_path_deps.sh
        - mcp_toolkit/pubspec.yaml
        - mcp_server_dart/pubspec.yaml
        - packages/core/pubspec.yaml
        - packages/server_capability_core/pubspec.yaml
        - packages/server_capability_kernel/pubspec.yaml
        - flutter_test_app/pubspec.yaml
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      owner: flutter-mcp-toolkit
      risk: hosted_dependency_cutover_regression
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
      validation:
        native_gate: make check-contracts
        falsifier: bash tool/intentcall/check_no_path_deps_test.sh
        benchmark: mcp_flutter.intentcall-hosted-cutover
  fmt.check.sdk-parity:
    kind: command
    desc: Verify Dart SDK floor parity between mcp_server_dart pubspec and Docker images.
    command:
      argv: [/bin/bash, tool/contracts/check_sdk_parity.sh]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/contracts/check_sdk_parity.sh
        - mcp_server_dart/pubspec.yaml
        - mcp_server_dart/Dockerfile
        - mcp_server_dart/Dockerfile.dev
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      owner: flutter-mcp-toolkit
      risk: sdk_floor_drift
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
      validation:
        native_gate: make check-contracts
  fmt.check.version-sync:
    kind: command
    desc: Verify repo VERSION matches package, runtime, plugin, and hosted dependency version touchpoints.
    command:
      argv: [/bin/bash, tool/contracts/check_version_sync.sh]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/contracts/check_version_sync.sh
        - VERSION
        - packages/core/lib/src/runtime_version.dart
        - packages/server_capability_core/lib/src/fmt_capability.dart
        - mcp_server_dart/pubspec.yaml
        - mcp_toolkit/pubspec.yaml
        - packages/core/pubspec.yaml
        - packages/server_capability_kernel/pubspec.yaml
        - packages/server_capability_core/pubspec.yaml
        - plugin/.cursor-plugin/plugin.json
        - plugin/.codex-plugin/plugin.json
        - plugin/.claude-plugin/plugin.json
        - .claude-plugin/marketplace.json
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      owner: flutter-mcp-toolkit
      risk: release_train_drift
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
      validation:
        native_gate: make check-contracts
  fmt.check.changelog-markdown:
    kind: command
    desc: Verify CHANGELOG markdown keeps Keep a Changelog headings and code identifiers unambiguous.
    command:
      argv: [/bin/bash, tool/contracts/check_changelog_markdown.sh]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/contracts/check_changelog_markdown.sh
        - CHANGELOG.md
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      owner: flutter-mcp-toolkit
      risk: changelog_markdown_drift
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
      validation:
        native_gate: make check-contracts
  fmt.check.repo-split-paths:
    kind: command
    desc: Verify split package directories exist and legacy package directories have not returned.
    command:
      argv: [/bin/bash, tool/contracts/check_repo_split_paths.sh]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/contracts/check_repo_split_paths.sh
        - packages/core
        - packages/server_capability_kernel
        - packages/server_capability_core
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      owner: flutter-mcp-toolkit
      risk: package_layout_regression
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
      validation:
        native_gate: make check-contracts
  fmt.check.intentcall-skills-grep:
    kind: command
    desc: Verify legacy MCPCallEntry references remain confined to the migration skill and generated bundle.
    command:
      argv: [/bin/bash, tool/contracts/check_intentcall_skills_grep.sh]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/contracts/check_intentcall_skills_grep.sh
        - plugin/skills
        - docs/core
        - docs/ai_agents
        - docs/guides
        - docs/contributing
        - plugin/README.md
        - plugin/agents/flutter-mcp-toolkit-runtime.md
        - plugin/.codex-plugin/plugin.json
        - ARCHITECTURE.md
        - mcp_server_dart/lib/src/skill_assets.g.dart
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      owner: flutter-mcp-toolkit
      risk: legacy_intentcall_surface_regression
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
      validation:
        native_gate: make check-contracts
  fmt.check.contracts-full:
    kind: command
    desc: Run the full native mcp_flutter contract gate through the repo Makefile.
    command:
      argv: [make, check-contracts]
      shell: false
    cwd: .
    effects:
      fs_read:
        - makefile
        - tool/contracts
        - tool/intentcall
        - steward.yaml
        - skills
        - plugin
        - docs
        - mcp_server_dart
        - mcp_toolkit
        - packages
        - flutter_test_app
      fs_write:
        - mcp_server_dart/.dart_tool
        - mcp_server_dart/pubspec.lock
        - mcp_server_dart/lib/src/skill_assets.g.dart
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 120000
      max_output_bytes: 400000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      owner: flutter-mcp-toolkit
      risk: full_contract_regression
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
      validation:
        native_gate: make check-contracts
probes:
  quick:
    profile: quick
    actions:
      - fmt.check.tool-prefix
      - fmt.check.intentcall-hosted-deps
      - fmt.check.sdk-parity
      - fmt.check.version-sync
      - fmt.check.changelog-markdown
      - fmt.check.repo-split-paths
      - fmt.check.intentcall-skills-grep
diagnostics:
  cases: {}
unknown_cases:
  path: .steward/unknown-cases
  retention: local
provenance:
  dependencies: []
  artifacts: []
  benchmarks:
    - id: mcp_flutter.contract-status-smoke
      manifest: steward/scenarios/mcp_flutter.contract-status-smoke.yaml
    - id: mcp_flutter.intentcall-hosted-cutover
      manifest: steward/scenarios/mcp_flutter.intentcall-hosted-cutover.yaml
branding:
  banned_words: [unlock, supercharge, ultimate, leverage]
  ignored_paths: []
governance:
  adr_directory: decisions/
  ethics_charter: docs/NORTH_STAR.md
skills_distribution:
  source_dir: skills/
  output: skills.sh.json
