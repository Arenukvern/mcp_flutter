name: flutter_inspector_mcp_server
version: 3.0.0
description: >-
  An MCP server for Flutter Inspector, exposing Flutter debugging and inspection
  tools to AI models via Dart VM service.

publish_to: none

environment:
  sdk: ^3.10.0

executables:
  flutter_inspector_mcp_server: main
  flutter_mcp_cli: flutter_mcp_cli

dependencies:
  args: ^2.7.0
  async: ^2.13.0
  collection: ^1.19.1
  dart_mcp: ^0.5.0
  dtd: ^4.0.0
  equatable: ^2.0.8
  flutter_live_edit_agent:
    path: ../flutter_live_edit/flutter_live_edit_agent
  flutter_live_edit_core:
    path: ../flutter_live_edit/flutter_live_edit_core
  from_json_to_json: ^0.4.0
  is_dart_empty_or_not: ^0.3.0
  json_rpc_2: ^4.1.0
  logging: ^1.3.0
  meta: ^1.18.1
  path: ^1.9.1
  process: ^5.0.5
  rx: ^0.5.0
  stream_channel: ^2.1.4
  vm_service: ^15.0.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
  xsoulspace_lints: ^0.1.2
# dependency_overrides:
# Use local dart_mcp if available, otherwise use pub version
# dart_mcp:
#   path: ../dart_mcp
