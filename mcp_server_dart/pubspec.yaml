name: flutter_mcp_toolkit_server
version: 4.0.0-dev.5
description: >-
  An MCP server for Flutter Inspector, exposing Flutter debugging and inspection
  tools to AI models via Dart VM service.
publish_to: none
environment:
  sdk: '>=3.12.0 <4.0.0'
resolution: workspace
executables:
  flutter-mcp-toolkit: flutter_mcp_toolkit
  flutter-mcp-toolkit-server: flutter_mcp_toolkit_server
dependencies:
  args: ^2.7.0
  async: ^2.13.0
  collection: ^1.19.1
  dart_mcp: ^0.5.0
  dtd: ^4.0.0
  equatable: ^2.0.8
  flutter_mcp_toolkit_capability_core: ^4.0.0-dev.5
  flutter_mcp_toolkit_capability_kernel: ^4.0.0-dev.5
  flutter_mcp_toolkit_core: ^4.0.0-dev.5
  from_json_to_json: ^0.5.0
  intentcall_core: ^0.1.0
  intentcall_mcp: ^0.1.0
  intentcall_platform: ^0.1.0
  intentcall_schema: ^0.1.0
  is_dart_empty_or_not: ^0.4.0
  json_rpc_2: ^4.1.0
  logging: ^1.3.0
  meta: ^1.18.0
  path: ^1.9.1
  process: ^5.0.5
  rx: ^0.5.0
  stream_channel: ^2.1.4
  vm_service: ^15.0.2
  web_socket_channel: ^3.0.3
  yaml: ^3.1.3
dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
  xsoulspace_inference_core: ^0.1.0-beta.1
  xsoulspace_lints: ^0.1.2
