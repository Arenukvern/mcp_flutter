name: flutter_mcp_toolkit_server
version: 3.0.7
description: >-
  An MCP server for Flutter Inspector, exposing Flutter debugging and inspection
  tools to AI models via Dart VM service.
publish_to: none
environment:
  sdk: ^3.11.0
executables:
  flutter-mcp-toolkit: flutter_mcp_toolkit
  flutter-mcp-toolkit-server: flutter_mcp_toolkit_server
dependencies:
  args: ^2.7.0
  async: ^2.13.0
  collection: ^1.19.1
  dart_mcp: ^0.5.0
  dtd: ^4.0.0
  equatable: ^2.0.8
  from_json_to_json: ^0.5.0
  is_dart_empty_or_not: ^0.4.0
  json_rpc_2: ^4.1.0
  logging: ^1.3.0
  mcp_capability_core:
    path: ../mcp_capability_core
  mcp_capability_kernel:
    path: ../mcp_capability_kernel
  mcp_shared_core:
    path: ../mcp_shared_core
  meta: ^1.17.0
  path: ^1.9.1
  process: ^5.0.5
  rx: ^0.5.0
  stream_channel: ^2.1.4
  vm_service: ^15.0.2
  web_socket_channel: ^3.0.3
dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
  xsoulspace_inference_core: ^0.1.0-beta.1
  xsoulspace_lints: ^0.1.2
