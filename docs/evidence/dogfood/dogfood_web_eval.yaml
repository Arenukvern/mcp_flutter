  best_score: 100
  worst_score: 28
  mean_score: 86.2
  iterations_count: 22
  app_mcp_log:
    initial_registration: "18 tools, 0 resources (+1 AgentCallEntry dogfood_ping)"
    delayed_registration: "2 tools, 1 resources"
  recurring_errors: []
  recurring_warnings:
    - visual_capture_truth_mode
    - visual_fidelity_skipped
  fix_recommendations:
    - Warm path green iterations 13–17 (score 100, visual_fidelity 10); re-run with DOGFOOD_VISUAL=1 + sibling flutter_harness when changing goldens.
    - Iteration 18 visual_fidelity_skipped — battery ran without warm-path compare; use full battery (no --skip-visual) for visual dimension.
    - Document exec connection flag as global --vm-service-uri (not exec --target).
    - Default dogfood Chrome validate-runtime without --save-images (use DOGFOOD_SAVE_IMAGES=1 when needed).
    - Dynamic list uses bare tool name (`dogfood_ping`); qualified `app_dogfood_ping` is descriptor-only (documented in INTENTCALL_PLATFORM.md).
  addressed:
    - exec fmt_* alias parity (CommandCatalog.resolveExecCommandName)
    - doctor visual_capture_truth_mode passes for web CDP desktop_window
    - dogfood --merge without yq (dart merge_dogfood_tracker.dart)
    - WebMCP dedupe + CDP verify (iterations 6–7)
  verdict: blocked_no_runtime
  webmcp_tooling:
    chrome_args: dart run mcp_server_dart/bin/flutter_mcp_toolkit.dart webmcp chrome-args
    verify: dart run mcp_server_dart/bin/flutter_mcp_toolkit.dart webmcp verify --web-port 8080
    showcase: make web-showcase
  browser_url: http://localhost:8080
