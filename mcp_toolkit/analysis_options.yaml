# Shared analyzer config (xsoulspace_lints) — aligned with intentcall monorepo.
include: package:xsoulspace_lints/library.yaml

analyzer:
  language:
    strict-casts: true
  errors:
    # Incremental cleanup: style infos remain visible but do not fail CI.
    lines_longer_than_80_chars: ignore
    public_member_api_docs: ignore
    unnecessary_library_directive: ignore
  exclude:
    - "**/*.g.dart"
