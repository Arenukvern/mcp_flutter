id: mcp-maintainer-capability-classification-trigger
skill: mcp-harness-repo-maintainer
routing: should_trigger
input: "We proved one mcp_flutter text input workflow; classify the capability and write the adoption evidence without claiming the repo is fully adopted"
rules:
  - kind: file_exists
    path: references/evals.md
  - kind: file_exists
    path: ../../docs/evidence/adoption-run-v2-template.mdx
  - kind: file_exists
    path: ../../docs/evidence/mcp-flutter-runtime-text-input-capability-proof-2026-06-10.mdx
  - kind: description_includes_any
    terms: ["adopting", "steward.yaml", "actions", "benchmarks"]
  - kind: body_includes_any
    path: SKILL.md
    terms: ["Adoption run classification", "capability-level H5", "fully adopted repo"]
  - kind: body_includes_any
    path: ../../docs/evidence/adoption-run-v2-template.mdx
    terms: ["capability", "scope", "continue | refactor | stop | abandon | promote"]
