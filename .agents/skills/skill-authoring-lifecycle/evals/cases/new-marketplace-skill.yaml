id: skill-authoring-scaffold-trigger
skill: skill-authoring-lifecycle
routing: should_trigger
input: "Create a new skill called review-lifecycle in the Skill Steward repo"
rules:
  - kind: file_exists
    path: references/evals.md
  - kind: description_includes_any
    terms: ["scaffold", "SKILL.md", "marketplace", "skill_steward"]
  - kind: body_includes_any
    path: SKILL.md
    terms: ["skills.sh.json", "pnpm run validate", "docs/STANDARDS"]
