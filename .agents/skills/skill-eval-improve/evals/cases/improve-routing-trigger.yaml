id: skill-eval-improve-routing-trigger
skill: skill-eval-improve
routing: should_trigger
input: "Improve this SKILL.md after routing eval failures and suggest a bounded quality fix"
rules:
  - kind: file_exists
    path: references/evals.md
  - kind: description_includes_any
    terms: ["tuning skill quality", "routing", "bounded edits"]
  - kind: body_includes_any
    path: SKILL.md
    terms: ["baseline", "bounded edit", "held-out gate"]
