name: jaspr_web_example
description: >-
  Jaspr-style web-only IntentCall example for the three-gate CI recipe
  (build_runner, manifest export --check, platform sync --check).
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.12.0 <4.0.0"


resolution: workspace

dependencies:
  intentcall_core:

dev_dependencies:
  build_runner: ^2.10.5
  intentcall_codegen:
  intentcall_hooks:
  lints: ^6.1.0

hooks:
  user_defines:
    intentcall_hooks:
      project_root: .
      platforms: web
      check_only: false
